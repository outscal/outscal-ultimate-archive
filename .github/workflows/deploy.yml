name: Deploy to Production

on:
  push:
    branches:
      - production

jobs:
  deploy:
    runs-on: self-hosted
    defaults:
      run:
        working-directory: /home/ubuntu/outscal-ultimate-archive
    steps:
      - name: Pull latest code
        run: git pull origin production

      - name: Restart pm2
        run: pm2 restart outscal-archive
